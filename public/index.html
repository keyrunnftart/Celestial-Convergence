<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000008">
<title>Celestial Convergence</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html{background:#000008;overflow:hidden;height:100%;width:100%}
body{background:#000008;width:100%;height:100%;overflow:hidden;position:fixed;top:0;left:0;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}
#c{display:block;width:100%;height:100%;position:fixed;top:0;left:0;touch-action:none;cursor:crosshair;}
@media (hover:none) and (pointer:coarse){#c{cursor:none}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
window.addEventListener('load',()=>{

const TF=1440, TAU=Math.PI*2;
function h(n){const x=Math.sin(n*127.1+311.7)*43758.5;return x-Math.floor(x);}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function sn(k,t,p=0){return Math.sin(TAU*k*t+p);}
function cn(k,t,p=0){return Math.cos(TAU*k*t+p);}
function ss(lo,hi,x){return clamp((x-lo)/(hi-lo),0,1);}
function tBasedMem(t){return 0.38+0.34*(0.5-0.5*Math.cos(TAU*t));}

// ─── ANCESTRAL TRAITS from CE and SS ──────────────────────────────
// CE peak bidder wallet hash → seeds orbital plane inclination base
// SS frozen palette hue → seeds central star colour
const CE_PEAK_WALLET = '0xD0490ADeAa23cd45846372Aa09317a57A8880200';
const SS_FROZEN_HUE  = 220; // degrees — SS colour at bid 50 freeze

// Derive orbital plane base angle from CE peak wallet
let ceWalletHash = 0;
for(let i=0;i<CE_PEAK_WALLET.length;i++) ceWalletHash=(ceWalletHash*31+CE_PEAK_WALLET.charCodeAt(i))&0xFFFFFF;
const CE_ORBITAL_PLANE = (ceWalletHash % 1000) / 1000 * Math.PI * 0.4; // 0 → 72° tilt

// ─── CURSOR ────────────────────────────────────────────────────────
const cursorRaw=new THREE.Vector2(0,0);
const cursor   =new THREE.Vector2(0,0);
const cursorVel=new THREE.Vector2(0,0);
let cursorStrength=0,cursorStrengthTarget=0,cursorVelMag=0;
function toNDC(cx,cy){return{x:(cx/window.innerWidth)*2-1,y:-(cy/window.innerHeight)*2+1};}
document.addEventListener('mousemove',e=>{const{x,y}=toNDC(e.clientX,e.clientY);cursorRaw.set(x,y);cursorStrengthTarget=1;},{passive:true});
document.addEventListener('mouseleave',()=>{cursorStrengthTarget=0;});
document.addEventListener('touchmove',e=>{const t2=e.touches[0];const{x,y}=toNDC(t2.clientX,t2.clientY);cursorRaw.set(x,y);cursorStrengthTarget=1;},{passive:true});
document.addEventListener('touchend',()=>{cursorStrengthTarget=0;},{passive:true});

// ─── MEMORY SYSTEM ────────────────────────────────────────────────
const MEM_PATH_LEN=128;
const memPath=Array.from({length:MEM_PATH_LEN},()=>new THREE.Vector2(0,0));
const memPathAge=new Float32Array(MEM_PATH_LEN).fill(1);
let memPathHead=0,pathSampleTimer=0;
let memoryLevel=0,memAccum=0;
const memDecayRate=0.000035;
let pathSample_dt=0;

function tickMemory(dt){
  pathSampleTimer+=dt;
  if(pathSampleTimer>0.067&&cursorStrength>0.05){
    pathSampleTimer=0;
    memPath[memPathHead].set(cursor.x,cursor.y);
    memPathAge[memPathHead]=0;
    memPathHead=(memPathHead+1)%MEM_PATH_LEN;
  }
  for(let i=0;i<MEM_PATH_LEN;i++) memPathAge[i]=Math.min(1,memPathAge[i]+dt*0.16);
  const gain=cursorStrength*(0.0005+clamp(cursorVelMag*12,0,1)*0.0008);
  memAccum=clamp(memAccum+gain-memDecayRate,0,1);
  const lr=memAccum>memoryLevel?0.007:0.0012;
  memoryLevel=clamp(memoryLevel+(memAccum-memoryLevel)*lr,0,1);
}

// ─── RENDERER ─────────────────────────────────────────────────────
const canvas=document.getElementById('c');
const R=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false,powerPreference:'high-performance',precision:'highp'});
let cam;
function isPhone(){return Math.min(window.innerWidth,window.innerHeight)<600;}
function isPortrait(){return window.innerHeight>window.innerWidth;}
function getAdaptiveFOV(){
  if(isPortrait()&&isPhone()) return 75;
  if(isPhone()) return 58;
  return 52;
}
function getAdaptiveCamRadius(){
  if(isPhone()&&isPortrait()) return 620;
  if(isPhone()) return 520;
  return 480;
}
let CAM_R_BASE=480;
let _resizeTimer=null;
function resize(){
  clearTimeout(_resizeTimer);
  _resizeTimer=setTimeout(()=>{
    const w=window.innerWidth,h=window.innerHeight;
    R.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
    R.setSize(w,h,false);
    if(cam){cam.aspect=w/h;cam.fov=getAdaptiveFOV();cam.updateProjectionMatrix();}
    CAM_R_BASE=getAdaptiveCamRadius();
  },50);
}
R.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
R.setSize(window.innerWidth,window.innerHeight,false);
window.addEventListener('resize',resize,{passive:true});
window.addEventListener('orientationchange',()=>setTimeout(resize,200),{passive:true});
R.setClearColor(0x000008,1);
R.outputEncoding=THREE.sRGBEncoding;
R.toneMapping=THREE.ACESFilmicToneMapping;
R.toneMappingExposure=1.8;

const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x000008,0.000015);
cam=new THREE.PerspectiveCamera(getAdaptiveFOV(),window.innerWidth/window.innerHeight,0.5,8000);
const ambient=new THREE.AmbientLight(0x223355,0.5);
scene.add(ambient);
const starLight=new THREE.PointLight(0xffcc66,0.0,800); // central star light
starLight.position.set(0,0,0);
scene.add(starLight);

// ─── CAMERA ───────────────────────────────────────────────────────
// Uses wallClock (continuous) for smooth camera orbit — no seam jerk
const CAM_PERIOD = 60; // seconds per full camera orbit
function getCam(wc){
  const az = (wc / CAM_PERIOD) * TAU;
  const elev = 0.22 * Math.sin(az * 2);
  const Rv = CAM_R_BASE + 35 * Math.cos(az * 2) - 20 * Math.abs(Math.sin(az * 2)) * 0.5;
  const cosE = Math.cos(elev), sinE = Math.sin(elev);
  return new THREE.Vector3(Rv*cosE*Math.cos(az), Rv*sinE, Rv*cosE*Math.sin(az));
}

// ─── STAR FIELD ───────────────────────────────────────────────────
// Inherited from SS — background unchanged
const ST_N=3000;
const stP=new Float32Array(ST_N*3);
const stPh=new Float32Array(ST_N);
const stType=new Float32Array(ST_N);
const stSz=new Float32Array(ST_N);
for(let i=0;i<ST_N;i++){
  const phi=Math.acos(1-2*h(i*2.1+10));
  const th=h(i*3.7+10)*TAU;
  const r=600+Math.pow(h(i*5.3+10),.5)*3500;
  stP[i*3]=r*Math.sin(phi)*Math.cos(th);
  stP[i*3+1]=r*Math.sin(phi)*Math.sin(th);
  stP[i*3+2]=r*Math.cos(phi);
  stPh[i]=h(i*7.1+10);
  const t2=h(i*11.3+10);
  stType[i]=t2<.50?1:t2<.85?0:2;
  stSz[i]=.5+Math.pow(h(i*13.7+10),.4)*2.4;
}
const stGeo=new THREE.BufferGeometry();
stGeo.setAttribute('position',new THREE.BufferAttribute(stP,3));
stGeo.setAttribute('aPh',new THREE.BufferAttribute(stPh,1));
stGeo.setAttribute('aType',new THREE.BufferAttribute(stType,1));
stGeo.setAttribute('aSz',new THREE.BufferAttribute(stSz,1));

const stVS=`
attribute float aPh,aType,aSz;
varying vec3 vC; varying float vG,vSp;
uniform float uT,uCursorStr,uMemory;
uniform vec2 uCursor;
void main(){
  float t=uT*6.28318;
  float ap=aPh*6.28318;
  float bright=1.;vSp=0.;vG=.36;
  if(aType<0.5){
    float tw=max(pow(max(0.,sin(t*5.+ap)),3.5),pow(max(0.,sin(t*8.+ap+1.9)),3.5));
    bright=2.1+1.7*tw;
    vC=vec3(.96,.94,.89)*bright;vG=.48+.42*tw;
  }else if(aType<1.5){
    float tw=pow(max(0.,sin(t*7.+ap)),3.5);
    bright=1.9+1.3*tw;
    vC=vec3(.96,.94,.88)*bright;vG=.48+.28*tw;
  }else{
    float b=max(pow(max(0.,sin(t*12.+ap)),2.),pow(max(0.,sin(t*18.+ap+2.4)),2.8)*.72)*4.;
    bright=b;vC=mix(vec3(.84,.90,1.15),vec3(1.35,1.35,1.25),b);vSp=.38;vG=.28+b*.52;
  }
  vec4 mv=modelViewMatrix*vec4(position,1.);
  float dist=length(mv.xyz);
  float pxSz=(aSz*2.5+bright*(aType>1.5?13.:3.))*200./dist;
  gl_PointSize=clamp(pxSz,.4,40.);gl_Position=projectionMatrix*mv;
}`;
const stFS=`
varying vec3 vC;varying float vG,vSp;
void main(){
  vec2 uv=gl_PointCoord*2.-1.;float d=dot(uv,uv);if(d>1.)discard;
  float core=1.-smoothstep(0.,.22,d);float glow=1.-smoothstep(0.,1.,d);
  float hdrC=1.-smoothstep(0.,.06,d);
  float a=core+glow*vG+hdrC*2.4;
  gl_FragColor=vec4(vC*(1.+hdrC*1.3),clamp(a,0.,1.));
}`;
const stMat=new THREE.ShaderMaterial({
  uniforms:{uT:{value:0},uCursor:{value:new THREE.Vector2()},uCursorStr:{value:0},uMemory:{value:0}},
  vertexShader:stVS,fragmentShader:stFS,
  transparent:true,depthWrite:false,blending:THREE.AdditiveBlending});
scene.add(new THREE.Points(stGeo,stMat));

// ─── NEBULA (6 planes, inherited from SS) ─────────────────────────
const nebVS=`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`;
const nebFS=`
varying vec2 vUv;
uniform float uT,uPh,uOpa,uTw,uBr,uMemory;
uniform vec3 uCA,uCB;
float hx(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}
float vn(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);
  return mix(mix(hx(i),hx(i+vec2(1,0)),f.x),mix(hx(i+vec2(0,1)),hx(i+vec2(1,1)),f.x),f.y);}
float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<5;i++){v+=a*vn(p);p=p*2.1+vec2(1.7,9.2);a*=.5;}return v;}
void main(){
  vec2 uv=vUv*2.-1.;float e=length(uv);
  float mask=smoothstep(1.,.10,e);if(mask<.001)discard;
  float t=uT*6.28318*2.+uPh;
  vec2 w=vec2(sin(t+uv.y*1.7),cos(t+0.8+uv.x*1.6))*.09*uTw;
  float n1=fbm((uv+w)*2.2+vec2(sin(t),cos(t+1.5))*.38);
  float n2=fbm((uv+w)*1.3+vec2(cos(t+.8),sin(t+2.3))*.38+vec2(3.1,7.4));
  float n3=fbm((uv+w)*4.0+vec2(sin(t),cos(t+1.1))*.38+vec2(13.7,2.9));
  float fil=smoothstep(.60,.84,n3)*smoothstep(.78,.94,n1);
  float dens=(pow(n1,1.40)*pow(n2,.75)*.82+fil*.30)*mask;
  vec3 col=mix(uCA,uCB,n2*.60);
  col=col*(0.12+clamp(uMemory/0.8,0.,1.)*0.88);
  col=col*uBr+uCA*smoothstep(.44,.88,n1)*.35;
  gl_FragColor=vec4(col,clamp(dens*uOpa,0.,.80));
}`;
// Adjusted palette — warm golds/ambers for solar system feel
const NP_CC=[[.08,.14],[.12,.18],[.06,.10],[.15,.20],[.10,.16],[.05,.12]];
const nebMats=[];
for(let i=0;i<8;i++){
  const p=NP_CC[i%6];
  const caCol=new THREE.Color().setHSL(p[0],.65,.28);
  const cbCol=new THREE.Color().setHSL(p[1],.60,.32);
  const mat=new THREE.ShaderMaterial({
    uniforms:{uT:{value:0},uPh:{value:h(i*17.3+5)*TAU*4},
      uCA:{value:caCol.clone()},uCB:{value:cbCol.clone()},
      uTw:{value:.35+h(i*13.1)*.70},uBr:{value:.45+h(i*19.3)*.40},
      uOpa:{value:.40+h(i*23.7)*.25},uMemory:{value:0}},
    vertexShader:nebVS,fragmentShader:nebFS,
    transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,side:THREE.DoubleSide});
  const sz=700+h(i*7.3)*900;
  const mesh=new THREE.Mesh(new THREE.PlaneGeometry(sz,sz*.75),mat);
  const phi=Math.acos(1-2*h(i*29.1+6)),thh=h(i*31.3+6)*TAU;
  const Rr=2400+h(i*37.9)*600;
  mesh.position.set(Rr*Math.sin(phi)*Math.cos(thh),Rr*Math.sin(phi)*Math.sin(thh)*.55,Rr*Math.cos(phi));
  mesh.lookAt(0,0,0);mesh.frustumCulled=false;
  scene.add(mesh);
  nebMats.push({mat,bk:[1,2,1,3,2,1,3,2][i],bo:h(i*43.1+6)*TAU,bBase:.40+h(i*23.7)*.25});
}

// ═══════════════════════════════════════════════════════════════════
//  CENTRAL STAR — inherits SS frozen palette (SS_FROZEN_HUE)
//  Pulses with total bid count — more bids = brighter, larger
// ═══════════════════════════════════════════════════════════════════
const starVS=`
varying vec3 vNorm;varying vec2 vUv2;
uniform float uT,uBidCount;
void main(){
  vNorm=normalize(normalMatrix*normal);vUv2=uv;
  float t=uT*6.28318;
  // Gentle surface displacement — breathes with time
  vec3 disp=vNorm*(sin(position.x*.18+t*2.)*0.6+sin(position.y*.24+t*3.)*0.5)*0.4;
  gl_Position=projectionMatrix*modelViewMatrix*vec4(position+disp,1.);
}`;
const starFS=`
precision highp float;
varying vec3 vNorm;varying vec2 vUv2;
uniform float uT,uBidCount,uSSHue,uFrozen;
vec3 hsl2rgb(float h,float s,float l){
  float c=(1.-abs(2.*l-1.))*s;
  float x=c*(1.-abs(mod(h*6.,2.)-1.));
  float m=l-c/2.;
  vec3 rgb=h<1./6.?vec3(c,x,0.):h<2./6.?vec3(x,c,0.):h<3./6.?vec3(0.,c,x):h<4./6.?vec3(0.,x,c):h<5./6.?vec3(x,0.,c):vec3(c,0.,x);
  return rgb+m;
}
void main(){
  float t=uT*6.28318;
  // Base: warm golden colour seeded from SS_FROZEN_HUE
  float baseHue=uSSHue/360.;
  float pulse=0.7+0.3*sin(t*1.0);
  float corona=pow(1.-abs(dot(vNorm,vec3(0.,0.,1.))),2.5);
  // Brightness grows with bid count
  float bidGlow=1.0+min(uBidCount*0.08,2.0);
  vec3 core=hsl2rgb(baseHue,.90,.65)*bidGlow*pulse;
  vec3 corGlow=hsl2rgb(baseHue,.70,.85)*corona*bidGlow;
  vec3 col=core+corGlow;
  float a=0.90+corona*0.08;
  gl_FragColor=vec4(col,clamp(a,0.,1.));
}`;
const starMesh=new THREE.Mesh(
  new THREE.SphereGeometry(18,48,48),
  new THREE.ShaderMaterial({
    uniforms:{uT:{value:0},uBidCount:{value:0},uSSHue:{value:SS_FROZEN_HUE},uFrozen:{value:0}},
    vertexShader:starVS,fragmentShader:starFS,
    transparent:false,depthWrite:true
  })
);
scene.add(starMesh);

// Star corona glow — additive halo
const coronaVS=`varying vec3 vNorm;void main(){vNorm=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`;
const coronaFS=`
varying vec3 vNorm;
uniform float uT,uBidCount,uSSHue;
vec3 hsl2rgb(float h,float s,float l){
  float c=(1.-abs(2.*l-1.))*s;float x=c*(1.-abs(mod(h*6.,2.)-1.));float m=l-c/2.;
  vec3 rgb=h<1./6.?vec3(c,x,0.):h<2./6.?vec3(x,c,0.):h<3./6.?vec3(0.,c,x):h<4./6.?vec3(0.,x,c):h<5./6.?vec3(x,0.,c):vec3(c,0.,x);
  return rgb+m;
}
void main(){
  float fresnel=pow(1.-abs(dot(vNorm,vec3(0.,0.,1.))),3.);
  float bidStr=min(uBidCount*0.06,1.5);
  float t=uT*6.28318;
  float pulse=0.5+0.5*sin(t*1.);
  vec3 col=hsl2rgb(uSSHue/360.,.85,.75)*(fresnel*bidStr*pulse*2.0);
  gl_FragColor=vec4(col,fresnel*0.6);
}`;
scene.add(new THREE.Mesh(
  new THREE.SphereGeometry(32,32,32),
  new THREE.ShaderMaterial({
    uniforms:{uT:{value:0},uBidCount:{value:0},uSSHue:{value:SS_FROZEN_HUE}},
    vertexShader:coronaVS,fragmentShader:coronaFS,
    transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,side:THREE.BackSide
  })
));
// store ref for uniform updates
const starCorona=scene.children[scene.children.length-1];

// ═══════════════════════════════════════════════════════════════════
//  ORBITAL BODY SYSTEM
//  Each bid spawns one planet. Bid amount → mass. Wallet → hue+tilt.
//  Outbid → orbit destabilises (eccentricity spikes, then restores).
//  Auction end → all orbits freeze permanently.
// ═══════════════════════════════════════════════════════════════════
const MAX_ORBITS = 12;
const orbits = [];     // array of OrbitalBody objects
let auctionFrozen = false;
let bidCount = 0;
let bidTotalETH = 0;
let lastBidderShort = '—';
let bidMemoryBoost = 0;

// Orbit path lines — thin ellipses for each planet
const orbitPathLines = [];

// Planet VS/FS — sphere with atmospheric rim glow
const planetVS=`
varying vec3 vNorm;varying vec3 vPos;
void main(){
  vNorm=normalize(normalMatrix*normal);
  vPos=position;
  gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);
}`;
const planetFS=`
precision highp float;
varying vec3 vNorm;varying vec3 vPos;
uniform float uHue,uMass,uT,uDestabilised,uGeneration;
vec3 hsl2rgb(float h,float s,float l){
  float c=(1.-abs(2.*l-1.))*s;float x=c*(1.-abs(mod(h*6.,2.)-1.));float m=l-c/2.;
  vec3 rgb=h<1./6.?vec3(c,x,0.):h<2./6.?vec3(x,c,0.):h<3./6.?vec3(0.,c,x):h<4./6.?vec3(0.,x,c):h<5./6.?vec3(x,0.,c):vec3(c,0.,x);
  return rgb+m;
}
void main(){
  float t=uT*6.28318;
  vec3 base=hsl2rgb(uHue,0.75,0.50);
  // Atmosphere rim
  float rim=pow(1.-abs(dot(vNorm,vec3(0.,0.,1.))),3.5);
  // Destabilised: flicker red
  vec3 destCol=mix(base,vec3(1.2,0.1,0.05),uDestabilised*0.6);
  vec3 rimCol=mix(base*1.4,vec3(1.4,0.5,0.1),uDestabilised*0.7);
  // Pulse brightness with mass
  float brightness=0.85+uMass*0.15+0.08*sin(t*2.+uHue*6.28);
  vec3 col=(destCol*brightness+rimCol*rim)*1.2;
  gl_FragColor=vec4(col,1.0);
}`;

// Orbit trail particles — per orbit
const TRAIL_PER = 120;
const trailGeos=[], trailMats=[], trailBufs=[], trailPools=[];

function createOrbitTrail(hue){
  const pos=new Float32Array(TRAIL_PER*3).fill(9999);
  const alpha=new Float32Array(TRAIL_PER);
  const geo=new THREE.BufferGeometry();
  const posBuf=new THREE.BufferAttribute(pos,3);
  posBuf.setUsage(THREE.DynamicDrawUsage);
  const alphaBuf=new THREE.BufferAttribute(alpha,1);
  alphaBuf.setUsage(THREE.DynamicDrawUsage);
  geo.setAttribute('position',posBuf);
  geo.setAttribute('aAlpha',alphaBuf);
  const trailVS2=`
attribute float aAlpha;varying float vA;
void main(){
  vA=aAlpha;if(vA<0.003){gl_PointSize=0.;gl_Position=vec4(9999.,9999.,0.,1.);return;}
  vec4 mv=modelViewMatrix*vec4(position,1.);float dist=length(mv.xyz);
  gl_PointSize=clamp((0.8+vA*3.0)*220./dist,0.3,10.);gl_Position=projectionMatrix*mv;
}`;
  const trailFS2=`
varying float vA;
uniform vec3 uCol;
void main(){
  if(vA<0.003)discard;
  vec2 uv=gl_PointCoord*2.-1.;float d=dot(uv,uv);if(d>1.)discard;
  float core=1.-smoothstep(0.,0.25,d);float glow=1.-smoothstep(0.,1.,d);
  gl_FragColor=vec4(uCol,(core*0.7+glow*0.25)*vA);
}`;
  // hsl → rgb for trail colour
  const hsl=new THREE.Color().setHSL(hue,0.7,0.6);
  const mat=new THREE.ShaderMaterial({
    uniforms:{uCol:{value:hsl}},
    vertexShader:trailVS2,fragmentShader:trailFS2,
    transparent:true,depthWrite:false,blending:THREE.AdditiveBlending});
  const pts=new THREE.Points(geo,mat);
  pts.frustumCulled=false;
  scene.add(pts);
  // pool of trail particles for this orbit
  const pool=Array.from({length:TRAIL_PER},()=>({active:false,life:0,px:0,py:0,pz:0}));
  trailGeos.push(geo);
  trailMats.push(mat);
  trailBufs.push({posBuf,alphaBuf,pos,alpha,pool});
  return trailBufs.length-1;
}

// OrbitalBody class
class OrbitalBody {
  constructor(bidETH, bidderWallet, bidIdx, bidderHue) {
    this.bidETH   = bidETH;
    this.wallet   = bidderWallet.toLowerCase();
    this.bidIdx   = bidIdx;
    this.hue      = bidderHue;

    // Mass: proportional to bid, clamped to reasonable range
    this.mass = clamp(bidETH * 0.6, 0.25, 2.2);
    // Mesh radius proportional to mass
    this.radius = 4 + this.mass * 5;

    // Orbit params — each planet further out, seeded by wallet
    this.semiMajorAxis = 55 + bidIdx * 38 + h(bidIdx*7.3+300)*20;
    // Inclination — seeded from wallet hash, rotated by CE ancestral plane
    const wHash = this._walletHash(bidderWallet);
    this.inclination = CE_ORBITAL_PLANE + (wHash / 65535) * 0.45 - 0.22;
    // Initial eccentricity — low by default
    this.eccentricityBase = 0.05 + h(bidIdx*11.1+300)*0.15;
    this.eccentricity = this.eccentricityBase;
    // Orbital speed — Keplerian: inner orbits faster
    this.speed = 0.0006 + (1/this.semiMajorAxis)*0.025;
    // Starting angle
    this.angle = h(bidIdx*19.3+300)*TAU;
    // Phase offset for independent timing
    this.phaseOfs = bidIdx / MAX_ORBITS;

    // State
    this.active = true;
    this.destabilised = false;
    this.destabiliseT = 0;
    this.spawnT = 0;
    this.spawning = true;
    this.frozen = false;

    // Create mesh
    this.geo = new THREE.SphereGeometry(this.radius,24,24);
    this.mat = new THREE.ShaderMaterial({
      uniforms:{uHue:{value:this.hue},uMass:{value:this.mass},uT:{value:0},
                uDestabilised:{value:0},uGeneration:{value:3}},
      vertexShader:planetVS,fragmentShader:planetFS
    });
    this.mesh = new THREE.Mesh(this.geo,this.mat);
    this.mesh.frustumCulled=false;
    scene.add(this.mesh);

    // Orbit path line (static ellipse visualisation)
    this._createOrbitLine();

    // Trail buffer index
    this.trailIdx = createOrbitTrail(this.hue);
    this.trailHead = 0;
    this.trailTimer = 0;
  }

  _walletHash(w){
    let h=0;
    for(let i=0;i<w.length;i++) h=(h*31+w.charCodeAt(i))&0xFFFF;
    return h;
  }

  _createOrbitLine(){
    const pts=[];
    const N=64;
    // Draw ellipse in local orbital plane
    for(let i=0;i<=N;i++){
      const a=i/N*TAU;
      const r=this.semiMajorAxis*(1-this.eccentricityBase*this.eccentricityBase)/
              (1+this.eccentricityBase*Math.cos(a));
      const x=r*Math.cos(a);
      const y=r*Math.sin(a)*Math.cos(this.inclination);
      const z=r*Math.sin(a)*Math.sin(this.inclination);
      pts.push(x,y,z);
    }
    const geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(pts),3));
    const col=new THREE.Color().setHSL(this.hue,0.6,0.55);
    const mat=new THREE.LineBasicMaterial({color:col,transparent:true,opacity:0.28,depthWrite:false});
    const line=new THREE.Line(geo,mat);
    line.frustumCulled=false;
    scene.add(line);
    this.orbitLine=line;
    orbitPathLines.push(line);
  }

  destabilise(){
    this.destabilised=true;
    this.destabiliseT=0;
  }

  getPosition(wc){
    if(this.frozen) return this._lastPos || new THREE.Vector3();
    // wc = wallClock seconds — continuous, never resets → perfectly smooth orbit
    const ang = this.angle + wc * this.speed * TAU;
    const r = this.semiMajorAxis*(1-this.eccentricity*this.eccentricity)/
              (1+this.eccentricity*Math.cos(ang));
    const x = r*Math.cos(ang);
    const y = r*Math.sin(ang)*Math.cos(this.inclination);
    const z = r*Math.sin(ang)*Math.sin(this.inclination);
    this._lastPos = new THREE.Vector3(x,y,z);
    return this._lastPos;
  }

  tick(dt, t, wc){
    if(!this.active) return;

    // Spawn fade-in
    if(this.spawning){
      this.spawnT=Math.min(1,this.spawnT+dt*0.4);
      const ease=1-Math.pow(1-this.spawnT,3);
      this.mesh.scale.setScalar(ease);
      if(this.orbitLine) this.orbitLine.material.opacity=0.28*ease;
      if(this.spawnT>=1){this.spawning=false;this.mesh.scale.setScalar(1);}
    }

    // Destabilise — eccentricity spikes then recovers
    if(this.destabilised){
      this.destabiliseT=Math.min(1,this.destabiliseT+dt*0.25);
      const spike=Math.sin(this.destabiliseT*Math.PI);
      this.eccentricity=this.eccentricityBase+spike*0.75;
      this.mat.uniforms.uDestabilised.value=spike;
      if(this.destabiliseT>=1){
        this.destabilised=false;
        this.eccentricity=this.eccentricityBase;
        this.mat.uniforms.uDestabilised.value=0;
      }
    }

    // Update position — use wallClock for smooth continuous motion
    const pos=this.getPosition(wc);
    this.mesh.position.copy(pos);
    this.mesh.rotation.y+=dt*0.3;
    this.mesh.rotation.x+=dt*0.1;
    this.mat.uniforms.uT.value=t;

    // Trail emission
    if(!auctionFrozen && !this.spawning){
      this.trailTimer+=dt;
      if(this.trailTimer>0.035){
        this.trailTimer=0;
        const buf=trailBufs[this.trailIdx];
        const idx=this.trailHead%TRAIL_PER;
        this.trailHead=(this.trailHead+1)%TRAIL_PER;
        buf.pool[idx].active=true;
        buf.pool[idx].life=1.0;
        buf.pool[idx].px=pos.x;
        buf.pool[idx].py=pos.y;
        buf.pool[idx].pz=pos.z;
      }
    }
  }

  freeze(){
    this.frozen=true;
    this.eccentricity=this.eccentricityBase;
    if(this.mat.uniforms.uDestabilised) this.mat.uniforms.uDestabilised.value=0;
    if(this.orbitLine) this.orbitLine.material.opacity=0.35; // brighten at freeze
  }

  dispose(){
    scene.remove(this.mesh);
    if(this.orbitLine) scene.remove(this.orbitLine);
    const trailPts=trailGeos[this.trailIdx]?.parent;
    if(trailPts) scene.remove(trailPts);
  }
}

// Wallet → orbit index mapping for outbid tracking
const walletToOrbit = new Map();

function spawnOrbit(bidETH, bidderWallet, bidCount){
  if(orbits.length >= MAX_ORBITS) return;
  // Derive hue from wallet
  let wh=0;
  for(let i=0;i<bidderWallet.length;i++) wh=(wh*31+bidderWallet.charCodeAt(i))&0xFFFFFF;
  const hue=(wh%1000)/1000;
  const body=new OrbitalBody(bidETH, bidderWallet, orbits.length, hue);
  walletToOrbit.set(bidderWallet.toLowerCase(), orbits.length);
  orbits.push(body);
}

function destabiliseWallet(wallet){
  const idx=walletToOrbit.get(wallet.toLowerCase());
  if(idx!==undefined && orbits[idx] && !orbits[idx].destabilised){
    orbits[idx].destabilise();
  }
}

function freezeAll(){
  auctionFrozen=true;
  orbits.forEach(o=>o.freeze());
  // Brighten star light permanently
  starLight.intensity=3.5;
}

// Tick all orbits + trails
function tickOrbits(dt, t, wc){
  for(let i=0;i<orbits.length;i++){
    orbits[i].tick(dt, t, wc);
  }
  // Update trail particles
  for(let oi=0;oi<trailBufs.length;oi++){
    const buf=trailBufs[oi];
    const {pool,pos,alpha,posBuf,alphaBuf}=buf;
    for(let j=0;j<TRAIL_PER;j++){
      const p=pool[j];
      if(!p.active){alpha[j]=0;pos[j*3]=9999;continue;}
      p.life=Math.max(0,p.life-dt*1.2);
      if(p.life<=0){p.active=false;alpha[j]=0;pos[j*3]=9999;continue;}
      pos[j*3]=p.px;pos[j*3+1]=p.py;pos[j*3+2]=p.pz;
      alpha[j]=clamp(p.life<0.15?p.life/0.15:p.life,0,1)*0.55;
    }
    posBuf.needsUpdate=true;
    alphaBuf.needsUpdate=true;
  }
}

// ═══════════════════════════════════════════════════════════════════
//  SPAWN 2 FOUNDING ORBITS — always present (like SS's 2 original BHs)
//  These represent CE and SS as ancestral planets
// ═══════════════════════════════════════════════════════════════════
// Founding orbit 1 — CE ancestor (amber/gold)
spawnOrbit(1.0, CE_PEAK_WALLET, 0);
// Founding orbit 2 — SS ancestor (blue-violet, SS hue)
const SS_ANCESTOR_WALLET = '0xDeAdBeEf0000111122223333444455556666777788';
spawnOrbit(0.75, SS_ANCESTOR_WALLET, -1);

// ═══════════════════════════════════════════════════════════════════
//  BID STATE — WebSocket driven
// ═══════════════════════════════════════════════════════════════════
let auctionSecondsLeft = -1;
let urgencyLevel = 0.0;
let countdownDisplay = '';
let cosmicEra = 0;
const ERA_NAMES = ['Nascent','Forming','Active','Transcendent'];
function updateEra(){ cosmicEra=Math.min(3,Math.floor(bidCount/3)); updateHUD(); }

let ws=null;
function connectBridge(){
  try{
    ws=new WebSocket('ws://localhost:3131');
    ws.onopen=()=>{ console.log('[CC] Bridge connected'); updateHUD(); };
    ws.onclose=()=>{ setTimeout(connectBridge,3000); };
    ws.onerror=()=>{ ws.close(); };
    ws.onmessage=e=>{
      let msg; try{msg=JSON.parse(e.data);}catch(err){return;}

      if(msg.type==='BID'){
        const wallet=msg.wallet||'0x000';
        bidCount++;
        bidTotalETH+=parseFloat(msg.amount||0);
        bidMemoryBoost=clamp(parseFloat(msg.amount||0.1)*3.0,0.2,0.9);
        lastBidderShort=wallet.length>10?wallet.slice(0,6)+'…'+wallet.slice(-4):wallet;
        // Destabilise previous top bidder
        if(msg.previousBidder && msg.previousBidder.toLowerCase()!==wallet.toLowerCase()){
          destabiliseWallet(msg.previousBidder);
        }
        // Spawn new orbit if under limit
        if(!walletToOrbit.has(wallet.toLowerCase())){
          spawnOrbit(parseFloat(msg.amount||0.1), wallet, bidCount);
        }
        starMesh.material.uniforms.uBidCount.value=bidCount;
        starCorona.material.uniforms.uBidCount.value=bidCount;
        updateEra(); updateHUD();
      }

      if(msg.type==='OUTBID'){
        destabiliseWallet(msg.wallet||'');
      }

      if(msg.type==='TICK'){
        auctionSecondsLeft=parseInt(msg.secondsLeft)||-1;
        if(auctionSecondsLeft>=0){
          urgencyLevel=clamp(1.0-auctionSecondsLeft/3600,0,1);
          const h2=Math.floor(auctionSecondsLeft/3600);
          const m=Math.floor((auctionSecondsLeft%3600)/60);
          const s=auctionSecondsLeft%60;
          countdownDisplay=h2>0?`${h2}h ${String(m).padStart(2,'0')}m`:m>0?`${m}m ${String(s).padStart(2,'0')}s`:`${s}s`;
        }
        updateHUD();
      }

      if(msg.type==='AUCTION_END'){
        auctionSecondsLeft=0; urgencyLevel=1.0; countdownDisplay='LOCKED';
        freezeAll();
        updateHUD();
      }
    };
  }catch(ex){console.warn('[CC] Bridge unavailable:',ex.message);}
}
connectBridge();

// ═══════════════════════════════════════════════════════════════════
//  HUD OVERLAY
// ═══════════════════════════════════════════════════════════════════
const hudEl=document.createElement('div');
hudEl.style.cssText=[
  'position:fixed','top:18px','left:18px','z-index:999',
  'font-family:monospace','font-size:12px','line-height:1.7',
  'color:rgba(255,210,130,0.85)',
  'text-shadow:0 0 8px rgba(255,180,50,0.7)',
  'pointer-events:none','user-select:none',
  'background:rgba(0,0,5,0.45)',
  'border:1px solid rgba(255,180,50,0.22)',
  'border-radius:6px','padding:8px 14px',
  'backdrop-filter:blur(4px)',
  'transition:opacity 0.4s'
].join(';');
document.body.appendChild(hudEl);
let hudVisible=true;

function updateHUD(){
  if(!hudVisible){hudEl.style.opacity='0';return;}
  hudEl.style.opacity='1';
  const urgR=Math.round(255);
  const urgG=Math.round(180-urgencyLevel*150);
  const urgB=Math.round(50-urgencyLevel*50);
  const urgColour=`rgb(${urgR},${urgG},${urgB})`;
  const countdownLine=auctionSecondsLeft<0?'':
    `ENDS IN : <b style="color:${urgColour}">${countdownDisplay}</b><br>`;
  const frozenLine=auctionFrozen?
    `<br><b style="color:#88ffcc">✦ SOLAR SYSTEM LOCKED — ${orbits.length} planets</b>`:'';
  hudEl.innerHTML=[
    `<span style="color:rgba(255,200,80,0.95);font-size:11px">CELESTIAL CONVERGENCE</span>`,
    `<span style="color:rgba(180,140,50,0.6);font-size:10px"> ● GEN 3 — ETHERLINK</span>`,
    `──────────────────────`,
    `BIDS &nbsp;&nbsp;&nbsp;: <b style="color:#ffd080">${bidCount}</b>`,
    `XTZ &nbsp;&nbsp;&nbsp;&nbsp;: <b style="color:#ffcc66">${bidTotalETH.toFixed(3)}</b>`,
    `PLANETS : <b style="color:#88ddff">${Math.max(0,orbits.length-2)}</b> spawned`,
    `ERA &nbsp;&nbsp;&nbsp;&nbsp;: <b style="color:#ffaacc">${ERA_NAMES[cosmicEra]}</b>`,
    `BIDDER &nbsp;: <span style="color:#aaffdd">${lastBidderShort}</span>`,
    countdownLine?`──────────────────────<br>${countdownLine}`:`──────────────────────`,
    frozenLine,
    `<span style="color:rgba(180,140,50,0.5);font-size:10px">H hide · B bid · O outbid · T countdown</span>`
  ].join('<br>');
}
updateHUD();

// ─── KEYBOARD ────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key==='h'||e.key==='H'){hudVisible=!hudVisible;updateHUD();}
  if(e.key==='b'||e.key==='B'){
    const w='0xTest'+String(bidCount).padStart(4,'0')+'feed';
    bidCount++;bidTotalETH+=0.1;bidMemoryBoost=0.5;
    lastBidderShort=w.slice(0,10)+'…';
    if(!walletToOrbit.has(w.toLowerCase())) spawnOrbit(0.1,w,bidCount);
    starMesh.material.uniforms.uBidCount.value=bidCount;
    starCorona.material.uniforms.uBidCount.value=bidCount;
    updateEra();updateHUD();
  }
  if(e.key==='o'||e.key==='O'){
    if(orbits.length>2) orbits[2].destabilise();
  }
  if(e.key==='t'||e.key==='T'){
    auctionSecondsLeft=600;urgencyLevel=0.83;countdownDisplay='10m 00s';
    if(window._mockTick) clearInterval(window._mockTick);
    window._mockTick=setInterval(()=>{
      if(auctionSecondsLeft<=0){clearInterval(window._mockTick);return;}
      auctionSecondsLeft--;
      urgencyLevel=clamp(1-auctionSecondsLeft/3600,0,1);
      const m=Math.floor(auctionSecondsLeft/60),s=auctionSecondsLeft%60;
      countdownDisplay=m>0?`${m}m ${String(s).padStart(2,'0')}s`:`${s}s`;
      updateHUD();
    },1000);updateHUD();
  }
  if(e.key==='f'||e.key==='F'){ freezeAll();updateHUD(); } // test freeze
});

// ═══════════════════════════════════════════════════════════════════
//  RENDER LOOP
// ═══════════════════════════════════════════════════════════════════
let frame=0, lastTime=performance.now();
let wallClock=0;
let _memWindow=0;

function tick(){
  requestAnimationFrame(tick);
  const t=frame/TF; frame=(frame+1)%TF;
  const now=performance.now();
  const dt=Math.min((now-lastTime)*0.001,0.05);
  lastTime=now;
  wallClock+=dt;

  // Bid boost decay
  if(bidMemoryBoost>0) bidMemoryBoost=Math.max(0,bidMemoryBoost-dt*0.125);

  const prevCX=cursor.x,prevCY=cursor.y;
  cursor.x+=(cursorRaw.x-cursor.x)*0.062;
  cursor.y+=(cursorRaw.y-cursor.y)*0.062;
  cursorVel.x+=((cursor.x-prevCX)/Math.max(dt,.001)*.016-cursorVel.x)*.12;
  cursorVel.y+=((cursor.y-prevCY)/Math.max(dt,.001)*.016-cursorVel.y)*.12;
  cursorVelMag=cursorVel.length();
  cursorStrength+=(cursorStrengthTarget-cursorStrength)*.055;
  cursorStrengthTarget*=.972;
  tickMemory(dt);

  // Memory
  const memFloor=tBasedMem(t);
  const memWindow=Math.pow(Math.sin(Math.PI*t),2);
  _memWindow=memWindow;
  const urgencyFloor=urgencyLevel*0.28;
  const bidBoostWindowed=bidMemoryBoost*memWindow;
  const mem=Math.min(1.0,memFloor+urgencyFloor+memoryLevel*0.45*memWindow+bidBoostWindowed);
  const cStr=cursorStrength*memWindow;

  // Camera — wallClock for perfectly smooth continuous orbit
  cam.position.copy(getCam(wallClock));
  const az=(wallClock/CAM_PERIOD)*TAU;
  const upTilt=0.12*Math.abs(Math.sin(az*2));
  cam.up.set(Math.sin(az*2)*.04, 1.-upTilt*.35, Math.cos(az*2)*.03+upTilt*.35);
  cam.lookAt(0,0,0);
  cam.fov=getAdaptiveFOV()+3*Math.sin(az*2)+4*upTilt;
  cam.updateProjectionMatrix();

  // Star light — pulses with bids and urgency
  if(!auctionFrozen){
    starLight.intensity=0.3+Math.min(bidCount*0.08,1.8)*(0.7+0.3*Math.sin(t*TAU*2));
    starLight.color.setHSL(SS_FROZEN_HUE/360,0.85,0.6);
  }

  // Uniform updates — stars, nebula
  stMat.uniforms.uT.value=t;
  stMat.uniforms.uCursor.value.copy(cursor);
  stMat.uniforms.uCursorStr.value=cStr;
  stMat.uniforms.uMemory.value=mem;
  nebMats.forEach(({mat,bk,bo,bBase})=>{
    mat.uniforms.uT.value=t;
    mat.uniforms.uOpa.value=bBase*(.65+.35*(.5+.5*sn(bk,t,bo)));
    mat.uniforms.uMemory.value=mem;
  });

  // Star
  starMesh.material.uniforms.uT.value=t;
  starCorona.material.uniforms.uT.value=t;

  // Orbits
  tickOrbits(dt, t, wallClock);

  // Orbit path line opacity — fade in with spawn, dim with urgency
  for(let i=0;i<orbitPathLines.length;i++){
    if(i<orbits.length && !auctionFrozen){
      const spawnAlpha=orbits[i].spawning?orbits[i].spawnT:1.0;
      orbitPathLines[i].material.opacity=0.28*spawnAlpha+urgencyLevel*0.08;
    }
  }

  // Star gentle scale pulse
  if(!auctionFrozen){
    const starScale=1.0+Math.min(bidCount*0.015,0.6)+0.04*Math.sin(t*TAU*1);
    starMesh.scale.setScalar(starScale);
    starCorona.scale.setScalar(starScale*1.4);
  }

  // Ambient — warms with bids
  ambient.intensity=0.45+Math.min(bidCount*0.02,0.4)+urgencyLevel*0.15;

  R.render(scene,cam);
}
requestAnimationFrame(tick);

}); // end load
</script>
